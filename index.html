<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Be My Valentine 💘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Poppins", sans-serif; }
  body, html { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #ffe3ec, #ffd6e0, #fbd4d4);
    color: #d14c73;
    position: relative;
  }

  /* Decorative floating hearts */
  .floating-heart {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff6b8a;
    transform: rotate(-45deg);
    border-radius: 50% 50% 0 0;
    animation: float 10s infinite ease-in-out;
    opacity: 0.7;
  }
  .floating-heart::before,
  .floating-heart::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff6b8a;
    border-radius: 50%;
  }
  .floating-heart::before { top: -9px; left: 0; }
  .floating-heart::after { left: 9px; top: 0; }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(-45deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-20vh) rotate(-45deg); opacity: 0; }
  }

  /* Sections */
  .section {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    transition: opacity 1s ease, transform 1s ease;
  }
  .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
  .active { opacity: 1; pointer-events: auto; }

  h1 { font-size: 3em; margin-bottom: 1rem; }
  h2 { font-size: 2em; margin-bottom: 0.8rem; }

  .buttons { display: flex; gap: 20px; margin-top: 1rem; position: relative; }
  button {
    padding: 14px 30px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1.2em;
    transition: all 0.3s ease;
  }

  .yes {
    background: #ff4d6d;
    color: white;
    font-size: 1.3em;
    box-shadow: 0 8px 20px rgba(255,77,109,0.4);
  }
  .yes:hover {
    transform: scale(1.08);
    background: #ff2e55;
  }

  .no {
    background: #fff;
    color: #d14c73;
    border: 2px solid #ff90a8;
    position: relative;
  }
  .no.shrink { transform: scale(0.7); }

  /* Questions */
  .question-box {
    background: #fff7fa;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(255, 100, 120, 0.25);
    min-width: 300px;
  }
  .question { display: none; flex-direction: column; gap: 12px; }
  .question.active { display: flex; }

  input, select {
    padding: 10px;
    font-size: 1em;
    border-radius: 12px;
    border: 1px solid #ffb7c5;
    outline: none;
  }
  #nextBtn {
    margin-top: 15px;
    background: #ff6b8a;
    color: white;
  }

  /* Summary */
  .summary-box {
    background: #fff0f5;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(255, 100, 120, 0.25);
    max-width: 500px;
  }

  /* Confetti hearts */
  .confetti {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ff5d8f;
    transform: rotate(-45deg);
    border-radius: 50% 50% 0 0;
    animation: fall 4s ease-in-out forwards;
  }
  .confetti::before,
  .confetti::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ff5d8f;
    border-radius: 50%;
  }
  .confetti::before { top: -7px; left: 0; }
  .confetti::after { left: 7px; top: 0; }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(-45deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(-45deg); opacity: 0; }
  }

  /* Small sparkle */
  .sparkle {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s infinite ease-in-out;
    opacity: 0.8;
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(0.4); opacity: 0.4; }
    50% { transform: scale(1.2); opacity: 1; }
  }
</style>
</head>
<body>

<!-- Floating background hearts -->
<script>
  for (let i = 0; i < 20; i++) {
    const h = document.createElement("div");
    h.className = "floating-heart";
    h.style.left = Math.random()*100 + "%";
    h.style.animationDelay = Math.random()*5 + "s";
    h.style.animationDuration = 8 + Math.random()*6 + "s";
    document.body.appendChild(h);
  }

  for (let i = 0; i < 25; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.width = s.style.height = (4 + Math.random()*4) + "px";
    s.style.left = Math.random()*100 + "%";
    s.style.top = Math.random()*100 + "%";
    s.style.animationDelay = Math.random()*3 + "s";
    document.body.appendChild(s);
  }
</script>

<!-- Landing -->
<div id="landing" class="section active">
  <h1>Will you be my Valentine? 💘</h1>
  <div class="buttons">
    <button id="yesBtn" class="yes">YES</button>
    <button id="noBtn" class="no">NO</button>
  </div>
</div>

<!-- Questions -->
<div id="questions" class="section hidden">
  <div class="question-box">
    <h2>✨ Date Questions ✨</h2>

    <div class="question active">
      <label>Kapan kita jalan bareng?</label>
      <input type="date" id="q1">
    </div>
    <div class="question">
      <label>Nonton film apa bareng?</label>
      <input type="text" id="q2" placeholder="Contoh: Titanic, Spiderman...">
    </div>
    <div class="question">
      <label>Liburan ke mana depan?</label>
      <input type="text" id="q3" placeholder="Contoh: Bali, Jepang...">
    </div>
    <button id="nextBtn">Next ➜</button>
  </div>
</div>

<!-- Summary -->
<div id="summary" class="section hidden">
  <div class="summary-box">
    <h2>💖 Our Valentine Plan 💖</h2>
    <p id="summaryText"></p>
    <p style="margin-top:15px; font-style: italic;">Aku nggak salah pilih, semuanya lebih indah bareng kamu 🥰</p>
    <button id="saveBtn">Save this memory 💾</button>
  </div>
</div>

<script>
  const landing = document.getElementById("landing");
  const questions = document.getElementById("questions");
  const summary = document.getElementById("summary");

  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");

  // NO button teleport
  function moveNo() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
    noBtn.classList.add("shrink");
    setTimeout(()=> noBtn.classList.remove("shrink"), 200);
  }
  noBtn.addEventListener("mouseover", moveNo);

  // Move when cursor close
  landing.addEventListener("mousemove", e => {
    const rect = noBtn.getBoundingClientRect();
    const dist = Math.hypot(
      e.clientX - (rect.left + rect.width/2),
      e.clientY - (rect.top + rect.height/2)
    );
    if (dist < 100) moveNo();
  });

  // Yes click
  yesBtn.addEventListener("click", () => {
    landing.classList.add("hidden");
    createConfetti();
    setTimeout(() => {
      landing.classList.remove("active");
      questions.classList.remove("hidden");
      questions.classList.add("active");
    }, 800);
  });

  // Confetti hearts
  function createConfetti() {
    for (let i=0; i<30; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random()*100 + "%";
      c.style.animationDelay = Math.random()*1 + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }

  // Questions logic
  const allQuestions = document.querySelectorAll(".question");
  let current = 0;
  document.getElementById("nextBtn").onclick = () => {
    if (current < allQuestions.length - 1) {
      allQuestions[current].classList.remove("active");
      current++;
      allQuestions[current].classList.add("active");
    } else {
      // show summary
      const q1 = document.getElementById("q1").value || "belum ditentukan";
      const q2 = document.getElementById("q2").value || "film romantis";
      const q3 = document.getElementById("q3").value || "tempat impian";

      document.getElementById("summaryText").innerHTML =
        `🗓 Date: <b>${q1}</b><br>
         🎬 Movie: <b>${q2}</b><br>
         ✈️ Vacation: <b>${q3}</b>`;

      questions.classList.add("hidden");
      summary.classList.remove("hidden");
      summary.classList.add("active");
    }
  };

  // Save memory
  document.getElementById("saveBtn").onclick = () => {
    const text = document.getElementById("summaryText").innerText + "\nAku nggak salah pilih, semuanya lebih indah bareng kamu ❤️";
    const blob = new Blob([text], {type: "text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "valentine-memory.txt";
    link.click();
  };
</script>
</body>
</html>
